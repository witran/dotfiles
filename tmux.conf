# -- general -------------------------------------------------------------------

set -g default-terminal "screen-256color"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

set -g history-limit 10000
set -g mouse on

set -g status-keys vi
set -g mode-keys vi

# prefix: C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# reload config
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# edit config
bind e new-window -n '~/.tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"~/.tmux.conf sourced\"'"


# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string '#h ❐ #S ● #I #W'

set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10

set -g monitor-activity on
set -g visual-activity off

set -g status-position top
set -g status-right ''

# window status
setw -g window-status-style "fg=#8a8a8a,bg=#080808,none"
setw -g window-status-format ' #W '
setw -g window-status-current-style "fg=#000000,bg=#00afff,bold"
setw -g window-status-current-format ' #W '
setw -g window-status-last-style "fg=#8a8a8a,bg=#080808,none"

# panes
set -g pane-border-style "fg=colour238,bg=colour235"
set -g pane-active-border-style "fg=brightred"

# clear screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history


# -- navigation ----------------------------------------------------------------

# sessions
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# panes (prefix + vim motion)
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# panes (no-prefix Alt motion)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# pane resizing (prefix)
bind -r h resize-pane -L 2
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 2

# zoom pane (no prefix)
bind -n M-z resize-pane -Z
bind -n C-Space resize-pane -Z

# splits
bind - split-window -v
bind \\ split-window -v
bind | split-window -h

# window cycling
bind -r C-p previous-window
bind Tab last-window
bind -n C-n next-window
bind -n C-Left previous-window
bind -n C-Right next-window

# jump to window by number (no prefix)
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi L send -X end-of-line

# copy to X11 clipboard (fallback to default copy-selection if xclip missing)
if -b 'command -v xclip > /dev/null 2>&1' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel'


# -- buffers -------------------------------------------------------------------

bind b list-buffers
bind p paste-buffer
bind P choose-buffer


# -- plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run -b '~/.tmux/plugins/tpm/tpm'
